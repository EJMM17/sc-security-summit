version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Monterrey"
    open-pull-requests-limit: 10
    reviewers:
      - "EJMM17"
    labels:
      - "dependencies"
    groups:
      next-stack:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
      sentry:
        patterns:
          - "@sentry/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
