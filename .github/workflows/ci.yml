name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Bypass env validation in CI — we don't ship runtime credentials in the
      # repo, and `next build` does not need real values to typecheck and
      # produce a build artifact. Production secrets live in Vercel.
      SKIP_ENV_VALIDATION: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
